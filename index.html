<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Princy के लिए एक प्यारा खेल 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8547a;
    --blush: #f9c6d3;
    --cream: #fff8f0;
    --deep: #3a1a2e;
    --gold: #e8a87c;
    --soft: #fde8ef;
  }

  body {
    font-family: 'Noto Sans Devanagari', 'Lato', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .heart-float {
    position: absolute;
    bottom: -60px;
    opacity: 0;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-110vh) rotate(30deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 28px;
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 92%;
    box-shadow: 0 20px 60px rgba(232,84,122,0.15), 0 4px 20px rgba(0,0,0,0.06);
    border: 1.5px solid var(--blush);
    text-align: center;
    margin: 2rem auto;
  }

  .ribbon {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--rose);
    color: white;
    font-size: 11px;
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 20px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .emoji-big {
    font-size: 3rem;
    display: block;
    margin: 0.5rem 0 0.25rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--deep);
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }

  h1 em { color: var(--rose); font-style: italic; }

  .subtitle {
    font-size: 0.85rem;
    color: #b07090;
    margin-bottom: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .progress-wrap {
    background: var(--soft);
    border-radius: 10px;
    height: 6px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--rose));
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  .question-area { min-height: 180px; }

  .q-number {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #cba0b0;
    margin-bottom: 0.5rem;
  }

  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--deep);
    line-height: 1.5;
    margin-bottom: 1.5rem;
    min-height: 56px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--soft);
    border: 1.5px solid var(--blush);
    border-radius: 14px;
    padding: 0.85rem 1rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--deep);
    cursor: pointer;
    text-align: left;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .option-btn .opt-emoji { font-size: 1.1rem; flex-shrink: 0; }

  .option-btn:hover, .option-btn:active {
    background: var(--blush);
    border-color: var(--rose);
    transform: translateX(4px);
  }

  .option-btn.selected {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
    transform: translateX(4px);
  }

  .reaction {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--soft);
    border-radius: 14px;
    font-size: 0.88rem;
    color: #c0507a;
    font-style: italic;
    display: none;
    line-height: 1.5;
    border-left: 3px solid var(--blush);
    text-align: left;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .reaction.show { display: block; }

  .next-btn {
    margin-top: 1.2rem;
    background: var(--rose);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 0.85rem 2rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s ease;
    display: none;
    -webkit-tap-highlight-color: transparent;
  }

  .next-btn:hover { background: #d43d68; transform: scale(1.02); }
  .next-btn.show { display: block; animation: fadeIn 0.4s ease; }

  .meter-wrap { margin: 1rem 0; }

  .meter-bar {
    height: 10px;
    background: var(--soft);
    border-radius: 10px;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    background: linear-gradient(90deg, #f9c6d3, #e8547a, #c0307a);
    border-radius: 10px;
    transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1);
    width: 0%;
  }

  .final-screen { display: none; }
  .final-screen.show { display: block; animation: fadeIn 0.6s ease; }
  .question-area.hide { display: none; }

  .final-emoji {
    font-size: 3.5rem;
    margin: 0.5rem 0;
    display: block;
    animation: heartBeat 1s ease-in-out infinite;
  }

  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    14%  { transform: scale(1.2); }
    28%  { transform: scale(1); }
    42%  { transform: scale(1.15); }
    70%  { transform: scale(1); }
  }

  .final-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: var(--deep);
    margin-bottom: 0.5rem;
    line-height: 1.4;
  }

  .final-title em { color: var(--rose); }

  .final-desc {
    font-size: 0.88rem;
    color: #b07090;
    line-height: 1.7;
    margin-bottom: 1.2rem;
    font-weight: 300;
  }

  .love-score-big {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: var(--rose);
    font-weight: 700;
    line-height: 1;
  }

  .love-score-label {
    font-size: 0.8rem;
    color: #cba0b0;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    display: block;
  }

  .message-box {
    background: linear-gradient(135deg, var(--soft), #ffd6e7);
    border-radius: 16px;
    padding: 1.2rem;
    margin: 1rem 0;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--deep);
    line-height: 1.6;
    border: 1px solid var(--blush);
  }

  .restart-btn {
    background: white;
    border: 1.5px solid var(--rose);
    color: var(--rose);
    border-radius: 14px;
    padding: 0.75rem 1.5rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .restart-btn:hover { background: var(--rose); color: white; }

  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall 2.5s ease-in forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(80vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 400px) {
    .card { padding: 2rem 1.4rem; }
    h1 { font-size: 1.4rem; }
    .q-text { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card">
  <div class="ribbon">✨ सिर्फ तुम्हारे लिए ✨</div>

    <div class="reaction" id="reaction"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">आगे बढ़ो →</button>
  </div>

  <div class="final-screen" id="finalScreen">
    <span class="final-emoji">💗</span>
    <p class="final-title" id="finalTitle"></p>
    <div class="love-score-big" id="loveScore"></div>

    <div class="meter-wrap">

    </div>
    <div class="message-box" id="messageBox"></div>
    <p class="final-desc" id="finalDesc"></p>
    <button class="restart-btn" onclick="restart()">फिर से खेलो 💫</button>
  </div>
</div>

      "छुपी हुई खुशी भी खुशी है 😊 अपनी रोशनी दुनिया को दिखाओ, Princy।",
      "उन्हें अभी तक पता नहीं? 👀 शायद एक hint की ज़रूरत है... 💘",
      "कुछ असली के लिए तैयार होना — यही सबसे खूबसूरत जगह है 🌸",
      "बताना नहीं, दिखाना — तुम गहराई और इरादे वाली लड़की हो 🤫✨"
    ]
  }
];

let current = 0, totalScore = 0, selectedIndex = -1;

function buildHearts() {
  const bg = document.getElementById('heartsBg');
  const emojis = ['💕','🌸','✨','💗','🌷','💓','🥀'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
    const dur = 8 + Math.random() * 12;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (Math.random() * dur) + 's';
    bg.appendChild(h);
  }
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById('qNumber').textContent = 'सवाल ' + (current + 1) + ' / ' + questions.length;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressBar').style.width = (current / questions.length * 100) + '%';
  document.getElementById('reaction').className = 'reaction';
  document.getElementById('nextBtn').className = 'next-btn';
  selectedIndex = -1;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.opts.forEach(function(o, i) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="opt-emoji">' + o.e + '</span><span>' + o.t + '</span>';
    btn.onclick = function() { selectOption(i, btn); };
    optDiv.appendChild(btn);
  });
}

function selectOption(i, btn) {
  if (selectedIndex !== -1) return;
  selectedIndex = i;
  document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  totalScore += questions[current].opts[i].pts;
  const reaction = document.getElementById('reaction');
  reaction.textContent = questions[current].reactions[i];
  reaction.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showFinal();
  else loadQuestion();
}

function showFinal() {
  document.getElementById('questionArea').classList.add('hide');
  document.getElementById('progressBar').style.width = '100%';

  const maxScore = questions.reduce(function(s, q) { return s + Math.max.apply(null, q.opts.map(function(o) { return o.pts; })); }, 0);
  const pct = Math.round((totalScore / maxScore) * 100);

  let title, msg, desc;
  if (pct >= 85) {
    title = 'Princy, तुम्हारा दिल <em>पहले से खुला है</em> 💗';
    msg = '"तुम गहराई से feel करती हो, चुपके से प्यार करती हो, और गर्मजोशी से देती हो। सही इंसान आने वाला नहीं — वो पहले से है, तुम्हारे इर्द-गिर्द घूम रहा है, बस तुम्हारे दरवाज़ा खोलने का इंतज़ार कर रहा है।"';
    desc = 'तुम्हारे अंदर एक खूबसूरत गर्माहट है। कोई पहले से ही पूरी तरह, बेहद चुपके से तुमसे प्यार कर रहा है। 🌸';
  } else if (pct >= 68) {
    title = 'तुम <em>खतरनाक हद तक प्यारी हो</em>, Princy ✨';
    msg = '"तुम में एक rare quality है — तुम लोगों को feel कराती हो कि उन्हें देखा जा रहा है। यह आम नहीं। यह extraordinary है। खुद को भी देखे जाने दो।"';
    desc = 'तुम्हारे दिल में बहुत खूबसूरत कमरे हैं। किसी को tour का हक मिलना चाहिए — शायद अब दरवाज़ा थोड़ा और खोलने का वक्त है। 💕';
  } else {
    title = 'दिल सँभाल कर रखा है, पर <em>अंदर से सोना है</em> 🌹';
    msg = '"तुमने जो दीवारें बनाई हैं वो खुद को बचाने के लिए हैं। पर दीवारें धूप को भी रोक देती हैं। कोई धैर्य से इंतज़ार कर रहा है — तोड़ने नहीं, बस तुम्हारे साथ खिलने के लिए।"';
    desc = 'तुम जितना दिखाती हो उससे ज़्यादा feel करती हो। कोई बात नहीं। सही इंसान जितना वक्त लगे, रुकेगा। 🤍';
  }

  document.getElementById('finalTitle').innerHTML = title;
  document.getElementById('loveScore').textContent = pct + '%';
  document.getElementById('messageBox').textContent = msg;
  document.getElementById('finalDesc').textContent = desc;
  document.getElementById('finalScreen').classList.add('show');

  setTimeout(function() { document.getElementById('meterFill').style.width = pct + '%'; }, 400);
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#e8547a','#f9c6d3','#e8a87c','#fff','#fde8ef','#c0307a'];
  for (let i = 0; i < 60; i++) {
    setTimeout(function() {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-10px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.width = (5 + Math.random() * 8) + 'px';
      c.style.height = (5 + Math.random() * 8) + 'px';
      document.body.appendChild(c);
      setTimeout(function() { c.remove(); }, 3000);
    }, i * 35);
  }
}

function restart() {
  current = 0; totalScore = 0; selectedIndex = -1;
  document.getElementById('finalScreen').classList.remove('show');
  document.getElementById('questionArea').classList.remove('hide');
  document.getElementById('meterFill').style.width = '0%';
  loadQuestion();
}

buildHearts();
loadQuestion();
</script>
</body>
</html>
